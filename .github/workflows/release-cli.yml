name: Release CLI

on:
  push:
    branches: [main]
    # CLI is in the changesets `ignore` list — only the manual
    # `chore/cli-release-X.Y.Z` PR (which bumps packages/cli/package.json)
    # should kick off a release. SDK / docs / sample changes no longer fire
    # the version-check job on every push.
    paths:
      - 'packages/cli/**'

permissions:
  contents: write

# Never cancel an in-flight binary build / GitHub Release; queue
# subsequent pushes serially instead.
concurrency:
  group: release-cli
  cancel-in-progress: false

env:
  # `actions/upload-artifact@v4`, `actions/download-artifact@v4`, and
  # `softprops/action-gh-release@v2` still declare Node 20 in their
  # manifests. Force them onto Node 24 until they're bumped to their
  # respective Node-24-native majors (separate PR — major bumps require
  # validation against an actual CLI release).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check-version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check CLI version
        id: version
        run: |
          VERSION=$(jq -r '.version' packages/cli/package.json)
          TAG="cli-v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build-binaries:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          # Ubuntu cross-compiles Linux + Windows targets (no signing required).
          - os: ubuntu-latest
            script: binaries:non-macos
            artifact: binaries-non-macos
          # macOS runner builds Mach-O binaries so @yao-pkg/pkg can apply an
          # ad-hoc codesign (`codesign -s -`) as its post-build step. Apple
          # Silicon rejects unsigned Mach-O at exec time (SIGKILL / EBADEXEC),
          # so arm64 MUST be built here; x64 is built alongside for consistency.
          - os: macos-14
            script: binaries:macos
            artifact: binaries-macos
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4.4.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - name: Build platform binaries
        run: pnpm --filter @a2x/cli ${{ matrix.script }}

      - name: Verify macOS binaries are ad-hoc signed
        if: matrix.os == 'macos-14'
        run: |
          for bin in packages/cli/binaries/a2x-macos-arm64 packages/cli/binaries/a2x-macos-x64; do
            if ! codesign -dv "$bin" 2>&1 | grep -q 'Signature=adhoc'; then
              echo "::error::$bin is not ad-hoc signed. Refusing to upload."
              codesign -dv "$bin" || true
              exit 1
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/binaries/a2x-*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [check-version, build-binaries]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4.4.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - name: Pack CLI tarball
        run: pnpm --filter @a2x/cli pack --pack-destination packages/cli

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/cli/binaries
          pattern: binaries-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: CLI ${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            packages/cli/*.tgz
            packages/cli/binaries/a2x-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

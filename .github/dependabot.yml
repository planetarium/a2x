version: 2
updates:
  # Workspace npm dependencies (pnpm lockfile is understood natively).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      typescript-toolchain:
        patterns:
          - "typescript"
          - "tsup"
          - "@typescript-eslint/*"
          - "eslint"
          - "vitest"
      llm-providers:
        patterns:
          - "@anthropic-ai/sdk"
          - "openai"
          - "@google/genai"
    ignore:
      # Major bumps are handled manually to avoid surprise breakages.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by workflows under .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
